<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:fragment="meta">
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
		<title>Moat Travel</title>
	</div>
</head>

<body>
	<div th:fragment="header">
		<nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm">
			<div class="container">
				<a class="navbar-brand" th:href="@{/}">Moat Travel</a>

				<div class="collapse navbar-collapse">
					<ul class="navbar-nav ms-auto">
						<li class="nav-item" sec:authorize="isAnonymous()">
							<a class="nav-link" th:href="@{/login}">ログイン</a>
						</li>
						<li class="nav-item" sec:authorize="isAnonymous()">
							<a class="nav-link" th:href="@{/signup}">会員登録</a>
						</li>

						<li class="nav-item" sec:authorize="isAuthenticated()">
							<span class="nav-link">ようこそ <span sec:authentication="name"></span> さん</span>
						</li>
						<li class="nav-item" sec:authorize="isAuthenticated()">
							<form th:action="@{/logout}" method="post">
								<button class="btn btn-link nav-link">ログアウト</button>
							</form>
						</li>
					</ul>
				</div>
			</div>
		</nav>
	</div>

	<main>
		<div class="container pt-4 pb-5 moattravel-container">

			<div th:if="${param.loggedIn}" class="alert alert-info">
				ログインしました。
			</div>

			<div th:if="${param.loggedOut}" class="alert alert-info">
				ログアウトしました。
			</div>

		</div>
	</main>


	<div th:replace="~{fragment :: footer}"></div>

	<div th:replace="~{fragment :: scripts}"></div>
	
</body>

</html>
